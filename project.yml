name: PaperorgNotes
options:
  bundleIdPrefix: com.paperorg
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "3N4Q2GQ558"
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

targets:
  PaperorgNotes:
    type: application
    platform: iOS
    sources:
      - path: PaperorgNotes
    entitlements:
      path: PaperorgNotes/Resources/PaperorgNotes.entitlements
    info:
      path: PaperorgNotes/Resources/Info.plist
      properties:
        CFBundleDisplayName: Paperorg Notes
        LSApplicationCategoryType: public.app-category.productivity
        NSMicrophoneUsageDescription: Paperorg Notes needs microphone access to record voice notes and meetings.
        NSSpeechRecognitionUsageDescription: Paperorg Notes uses speech recognition for on-device English transcription.
        NSFaceIDUsageDescription: Paperorg Notes uses Face ID to protect your private notes.
        UIBackgroundModes:
          - audio
        UILaunchStoryboardName: LaunchScreen
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLName: com.paperorg.notes
            CFBundleURLSchemes:
              - paperorgnotes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.paperorg.notes
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: PaperorgNotes/Resources/PaperorgNotes.entitlements
    dependencies:
      - target: PaperorgNotesWidgetExtension
        embed: true

  PaperorgNotesWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: PaperorgNotesWidget
    entitlements:
      path: PaperorgNotesWidget/PaperorgNotesWidget.entitlements
    info:
      path: PaperorgNotesWidget/Info.plist
      properties:
        CFBundleDisplayName: Paperorg Notes Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.paperorg.notes.widget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: PaperorgNotesWidget/PaperorgNotesWidget.entitlements
        SKIP_INSTALL: YES

  PaperorgNotesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PaperorgNotesTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.paperorg.notes.tests
    dependencies:
      - target: PaperorgNotes

schemes:
  PaperorgNotes:
    build:
      targets:
        PaperorgNotes: all
        PaperorgNotesWidgetExtension: all
    test:
      targets:
        - PaperorgNotesTests
