services:
  postgres:
    image: postgres:16-alpine
    container_name: paperorg-notes-db
    environment:
      POSTGRES_USER: paperorg
      POSTGRES_PASSWORD: paperorg
      POSTGRES_DB: paperorg_pro
    ports:
      - "5444:5432"
    volumes:
      - paperorg_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperorg -d paperorg_pro"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  paperorg_pg_data:
